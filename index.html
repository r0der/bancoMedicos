<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AAPM – Directorio de Médicos</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --azul-oscuro: #0d2a6e;
      --azul-medio: #1a3fa3;
      --blanco: #ffffff;
      --gris-fondo: #f0f4fb;
      --sombra: 0 4px 24px rgba(13,42,110,0.13);
    }
    html, body { height: 100%; font-family: 'Open Sans', sans-serif; background: var(--gris-fondo); color: var(--azul-oscuro); }
    header {
      background: linear-gradient(135deg, var(--azul-oscuro) 0%, var(--azul-medio) 100%);
      padding: 28px 20px 22px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      box-shadow: var(--sombra); position: relative; overflow: hidden;
    }
    header::before { content: ''; position: absolute; top: -40px; right: -40px; width: 180px; height: 180px; border-radius: 50%; background: rgba(255,255,255,0.05); }
    header::after  { content: ''; position: absolute; bottom: -30px; left: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.04); }
    .logo-wrapper {
      width: 110px; height: 110px; border-radius: 50%; background: var(--blanco);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25); padding: 4px; flex-shrink: 0; position: relative; z-index: 1;
    }
    .logo-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }
    .header-texto { text-align: center; position: relative; z-index: 1; }
    .header-texto h1 { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: clamp(1.5rem, 5vw, 2.2rem); color: var(--blanco); letter-spacing: 3px; text-transform: uppercase; }
    .header-texto .subtitulo { font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: clamp(0.68rem, 2.2vw, 0.85rem); color: rgba(255,255,255,0.72); letter-spacing: 1px; text-transform: uppercase; margin-top: 5px; }
    .divider { width: 48px; height: 3px; background: rgba(255,255,255,0.4); border-radius: 2px; margin: 6px auto 0; }
    main { display: flex; flex-direction: column; padding: 20px 16px 24px; gap: 16px; max-width: 1400px; margin: 0 auto; width: 100%; }
    .etiqueta-directorio { display: flex; align-items: center; gap: 10px; }
    .etiqueta-directorio span { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.78rem; color: var(--azul-medio); text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap; }
    .etiqueta-directorio::after { content: ''; flex: 1; height: 1px; background: rgba(13,42,110,0.15); }
    .notion-contenedor { width: 100%; background: var(--blanco); border-radius: 12px; box-shadow: var(--sombra); overflow: hidden; border: 1px solid rgba(13,42,110,0.09); }
    .notion-contenedor iframe { width: 100%; height: 75vh; min-height: 500px; border: none; display: block; }
    footer { text-align: center; padding: 14px 20px; font-size: 0.72rem; color: rgba(13,42,110,0.45); font-family: 'Montserrat', sans-serif; letter-spacing: 0.5px; }
    @media (min-width: 768px) {
      header { flex-direction: row; justify-content: center; gap: 24px; padding: 32px 40px; }
      .header-texto { text-align: left; }
      .divider { margin: 6px 0 0; }
      .logo-wrapper { width: 120px; height: 120px; }
      .notion-contenedor iframe { height: 80vh; min-height: 600px; }
      main { padding: 28px 32px 32px; }
    }
    @media (min-width: 1200px) {
      .notion-contenedor iframe { height: 82vh; min-height: 700px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-wrapper">
      <img src="aapm.png" alt="Logo AAPM" />
    </div>
    <div class="header-texto">
      <h1>AAPM</h1>
      <div class="divider"></div>
      <p class="subtitulo">Asociación Agentes de Propaganda Médica · Rep. Argentina</p>
    </div>
  </header>

  <main>
    <div class="etiqueta-directorio">
      <span>Directorio de Médicos</span>
    </div>
    <div class="notion-contenedor">
      <iframe
  src="https://www.notion.so/embeds/361c1428ec0b80f8a0e6ce8e91e1a0c4?v=361c1428ec0b816bab09000c9fe4c618"
  width="100%"
  height="1000"
  style="border:none;border-radius:12px;">
</iframe>
    </div>
  </main>

  <footer>
    &copy; 2025 AAPM · Asociación Agentes de Propaganda Médica · República Argentina
  </footer>
</body>
</html>
