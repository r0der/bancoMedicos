<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AAPM – Directorio Médico</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet" />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Open Sans',sans-serif;
      background:#f3f6fc;
      color:#0d2a6e;
    }

    header{
      background:linear-gradient(135deg,#0d2a6e,#1a3fa3);
      color:white;
      padding:30px 20px;
      text-align:center;
      box-shadow:0 4px 18px rgba(0,0,0,0.15);
    }

    header h1{
      font-family:'Montserrat',sans-serif;
      font-size:2rem;
      letter-spacing:3px;
      margin-bottom:8px;
    }

    header p{
      opacity:.85;
      font-size:.9rem;
    }

    .contenedor{
      max-width:1400px;
      margin:auto;
      padding:25px;
    }

    .barra{
      display:flex;
      gap:14px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .barra input,
    .barra select{
      padding:12px 14px;
      border-radius:10px;
      border:1px solid #cfd8ef;
      font-size:.95rem;
      flex:1;
      min-width:220px;
      background:white;
    }

    .tabla-wrapper{
      background:white;
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 4px 24px rgba(0,0,0,0.08);
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    thead{
      background:#0d2a6e;
      color:white;
    }

    th,td{
      padding:14px 16px;
      text-align:left;
      border-bottom:1px solid #edf1fa;
      font-size:.93rem;
    }

    tbody tr:hover{
      background:#f7f9ff;
    }

    .loading{
      text-align:center;
      padding:40px;
      color:#5c6f9c;
    }

    @media(max-width:768px){

      table{
        display:block;
        overflow-x:auto;
      }

      th,td{
        min-width:180px;
      }

    }

  </style>
</head>

<body>

<header>
  <h1>AAPM</h1>
  <p>Asociación Agentes de Propaganda Médica · República Argentina</p>
</header>

<div class="contenedor">

  <div class="barra">

    <input
      type="text"
      id="buscador"
      placeholder="Buscar médico, ciudad o especialidad..."
    />

    <select id="filtroEspecialidad">
      <option value="">Todas las especialidades</option>
    </select>

  </div>

  <div class="tabla-wrapper">

    <table>

      <thead>
        <tr>
          <th>Médico</th>
          <th>Especialidad</th>
          <th>Ciudad</th>
          <th>Teléfono</th>
          <th>Dirección</th>
        </tr>
      </thead>

      <tbody id="tablaMedicos">

        <tr>
          <td colspan="5" class="loading">
            Cargando directorio...
          </td>
        </tr>

      </tbody>

    </table>

  </div>

</div>

<script>

const API_URL = 'https://script.google.com/macros/s/AKfycbxHK-v2YcLXfgX-AP2GqTSmvmtrjWR3fQ1IVEp1BjHdlQVIXYLul__78KwWaDQKcK8ieg/exec';



let medicos = [];



async function cargarDatos(){

  try{

    console.log("Consultando API...");

    const response = await fetch(API_URL,{
      method:'GET',
      mode:'cors'
    });

    console.log(response);

    medicos = await response.json();

    console.log(medicos);

    renderTabla(medicos);

    cargarEspecialidades();

  }
  catch(error){

    console.error(error);

    document.getElementById('tablaMedicos').innerHTML = `
      <tr>
        <td colspan="5" class="loading">
          Error cargando datos.
        </td>
      </tr>
    `;

  }

}



function renderTabla(datos){

  const tbody = document.getElementById('tablaMedicos');

  if(!datos.length){

    tbody.innerHTML = `
      <tr>
        <td colspan="5" class="loading">
          No se encontraron resultados.
        </td>
      </tr>
    `;

    return;
  }

  tbody.innerHTML = datos.map(medico => `

    <tr>
      <td>${medico.nombre || ''}</td>
      <td>${medico.especialidad || ''}</td>
      <td>${medico.ciudad || ''}</td>
      <td>${medico.telefono || ''}</td>
      <td>${medico.direccion || ''}</td>
    </tr>

  `).join('');

}



function cargarEspecialidades(){

  const select = document.getElementById('filtroEspecialidad');

  const especialidades = [
    ...new Set(
      medicos
        .map(m => m.especialidad)
        .filter(Boolean)
    )
  ].sort();

  especialidades.forEach(especialidad => {

    const option = document.createElement('option');

    option.value = especialidad;
    option.textContent = especialidad;

    select.appendChild(option);

  });

}



function aplicarFiltros(){

  const texto = document
    .getElementById('buscador')
    .value
    .toLowerCase();

  const especialidad = document
    .getElementById('filtroEspecialidad')
    .value;

  const filtrados = medicos.filter(medico => {

    const coincideTexto =

      (medico.nombre || '')
        .toLowerCase()
        .includes(texto)

      ||

      (medico.ciudad || '')
        .toLowerCase()
        .includes(texto)

      ||

      (medico.especialidad || '')
        .toLowerCase()
        .includes(texto);

    const coincideEspecialidad =

      !especialidad ||
      medico.especialidad === especialidad;

    return coincideTexto && coincideEspecialidad;

  });

  renderTabla(filtrados);

}



window.addEventListener('DOMContentLoaded', () => {

  document
    .getElementById('buscador')
    .addEventListener('input', aplicarFiltros);

  document
    .getElementById('filtroEspecialidad')
    .addEventListener('change', aplicarFiltros);

  cargarDatos();

});

</script>

</body>
</html>
