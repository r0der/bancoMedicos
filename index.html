<!DOCTYPE html>

    <select id="filtroEspecialidad">
      <option value="">Todas las especialidades</option>
    </select>
  </div>

  <div class="tabla-wrapper">
    <table>
      <thead>
        <tr>
          <th>Médico</th>
          <th>Especialidad</th>
          <th>Ciudad</th>
          <th>Teléfono</th>
          <th>Dirección</th>
        </tr>
      </thead>

      <tbody id="tablaMedicos">
        <tr>
          <td colspan="5" class="loading">Cargando directorio...</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<script>

const API_URL = 'https://script.google.com/macros/s/AKfycbxHK-v2YcLXfgX-AP2GqTSmvmtrjWR3fQ1IVEp1BjHdlQVIXYLul__78KwWaDQKcK8ieg/exec';

let medicos = [];

async function cargarDatos() {
  try {
    const response = await fetch(API_URL);
    medicos = await response.json();

    renderTabla(medicos);
    cargarEspecialidades();

  } catch (error) {
    console.error(error);

    document.getElementById('tablaMedicos').innerHTML = `
      <tr>
        <td colspan="5" class="loading">
          Error cargando datos.
        </td>
      </tr>
    `;
  }
}

function renderTabla(datos) {
  const tbody = document.getElementById('tablaMedicos');

  if (!datos.length) {
    tbody.innerHTML = `
      <tr>
        <td colspan="5" class="loading">
          No se encontraron resultados.
        </td>
      </tr>
    `;

    return;
  }

  tbody.innerHTML = datos.map(medico => `
    <tr>
      <td>${medico.nombre || ''}</td>
      <td>${medico.especialidad || ''}</td>
      <td>${medico.ciudad || ''}</td>
      <td>${medico.telefono || ''}</td>
      <td>${medico.direccion || ''}</td>
    </tr>
  `).join('');
}

function cargarEspecialidades() {
  const select = document.getElementById('filtroEspecialidad');

  const especialidades = [...new Set(
    medicos.map(m => m.especialidad).filter(Boolean)
  )].sort();

  especialidades.forEach(especialidad => {
    const option = document.createElement('option');
    option.value = especialidad;
    option.textContent = especialidad;
    select.appendChild(option);
  });
}

function aplicarFiltros() {
  const texto = document.getElementById('buscador').value.toLowerCase();
  const especialidad = document.getElementById('filtroEspecialidad').value;

  const filtrados = medicos.filter(medico => {

    const coincideTexto =
      (medico.nombre || '').toLowerCase().includes(texto) ||
      (medico.ciudad || '').toLowerCase().includes(texto) ||
      (medico.especialidad || '').toLowerCase().includes(texto);

    const coincideEspecialidad =
      !especialidad || medico.especialidad === especialidad;

    return coincideTexto && coincideEspecialidad;
  });

  renderTabla(filtrados);
}


document.getElementById('buscador')
  .addEventListener('input', aplicarFiltros);


document.getElementById('filtroEspecialidad')
  .addEventListener('change', aplicarFiltros);


cargarDatos();

</script>

</body>
</html>
